<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FPV — Дашборд</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>FPV Відеоспостереження</h1>
    <span id="summary" class="summary"></span>
    <label class="size-ctl" title="Розмір вікон">
      <span aria-hidden="true">▭</span>
      <input type="range" id="tile-size" min="240" max="720" step="20" />
    </label>
    <button id="sound-toggle" title="Звук сповіщень">🔕</button>
    <button id="journal-btn" title="Журнал детекцій">📜 Журнал</button>
    <button id="frames-btn" title="Архів демодульованих кадрів">🖼️ Кадри</button>
    <button id="restart-all" title="Перезапустити всі перегляди">🔄 Усі</button>
    <button id="add-device" class="btn-primary">➕ Додати вузол</button>
    <button id="logout">Вийти</button>
  </header>

  <section id="viewer-panel" class="viewer-panel hidden" aria-live="polite">
    <div class="viewer-head">
      <strong>🎯 FPV Viewer</strong>
      <span id="viewer-badge" class="view-badge"></span>
      <span id="viewer-err" class="view-err"></span>
      <button id="viewer-stop" hidden>■ свіп</button>
    </div>
    <div class="viewer-body">
      <div id="viewer-list" class="viewer-list"></div>
      <div class="viewer-player">
        <video id="viewer-video" autoplay playsinline muted></video>
      </div>
    </div>
  </section>

  <section id="spectrum-panel" class="spectrum-panel hidden" aria-live="polite"></section>

  <main id="grid" class="grid" aria-live="polite"></main>

  <!-- Fullscreen video viewer -->
  <div id="modal" class="modal hidden">
    <button id="modal-close" class="modal-close">✕</button>
    <video id="modal-video" autoplay playsinline muted></video>
    <img id="modal-image" class="modal-image hidden" alt="recovered frame" />
    <div id="modal-caption" class="modal-caption"></div>
  </div>

  <!-- Reusable form / credentials modal -->
  <div id="form-modal" class="modal2 hidden">
    <div class="card">
      <button class="card-close" data-close>✕</button>
      <div id="form-modal-body"></div>
    </div>
  </div>

  <script src="/vendor/mqtt.min.js"></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
